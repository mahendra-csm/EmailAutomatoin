<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0c0c0c;
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
        }

        .logo span {
            color: #ff2d55;
        }

        .logout {
            text-decoration: none;
            background: #1c1c1c;
            border: 1px solid #2f2f2f;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .dashboard-card {
            background: #141414;
            border: 1px solid #242424;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        .heading {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .subheading {
            color: #9d9d9d;
            margin-bottom: 40px;
        }

        .upload-box {
            border: 2px dashed #ff2d55;
            background: rgba(255,45,85,0.06);
            border-radius: 20px;
            padding: 45px;
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-box h3 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        .upload-box p {
            color: #a7a7a7;
            margin-bottom: 20px;
        }

        input[type="file"] {
            background: #1d1d1d;
            border: 1px solid #343434;
            padding: 14px;
            border-radius: 14px;
            width: 100%;
            color: white;
        }

        .input-group {
            margin-top: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #d1d1d1;
        }

        .input-group input {
            width: 100%;
            background: #1d1d1d;
            border: 1px solid #343434;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 30px;
            border: none;
            padding: 18px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff2d55, #ff0040);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(255,45,85,0.35);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 35px;
        }

        .stat-card {
            background: #181818;
            border: 1px solid #282828;
            padding: 25px;
            border-radius: 18px;
        }

        .stat-card h4 {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 26px;
            font-weight: 700;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="topbar">
        <div class="logo">One<span>Grasp</span></div>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="dashboard-card">

        <div class="heading">
            Email Extraction Automation
        </div>

        <div class="subheading">
            Upload websites list, trigger GitHub deployment, Jenkins pipeline and automated crawler execution.
        </div>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="upload-box">
                <h3>Upload websites.txt</h3>
                <p>Upload your latest websites list for automated processing.</p>

                <input type="file" name="file" required>
            </div>

            <div class="input-group">
                <label>Commit Message</label>
                <input type="text" name="message" placeholder="Enter deployment message" required>
            </div>

            <button class="submit-btn" type="submit">
                Start Automation Pipeline
            </button>

        </form>

        <div class="stats">

            <div class="stat-card">
                <h4>Pipeline Status</h4>
                <p>Active</p>
            </div>

            <div class="stat-card">
                <h4>Environment</h4>
                <p>Production</p>
            </div>

            <div class="stat-card">
                <h4>Automation</h4>
                <p>Enabled</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
